<!-- Filters Section -->
{{ define "sidecolumn" }}
<aside id="sidecolumn" class="mx-6 mt-6 w-64 rounded-md bg-white">
    {{ range $index, $filter := .Filters }}
    <div id="accordion-{{ $index }}" class="border-b border-gray-200">
      <!-- Accordion Header -->
      <div id="accordion-heading-{{ $index }}" class="p-4 cursor-pointer bg-gray-100 hover:bg-gray-200">
        <button
        id="accordion-button-{{ $index }}"
        aria-expanded="false"
        aria-controls="accordion-body-{{ $index }}"
        class="w-full"
        onclick="toggleAccordion('{{ $index }}')">
        <div class="flex items-center justify-between w-full spaxe-x-10">
          <span class="text-black font-bold">{{ $filter.Category }}</span>
          <div class="svg-wrapper w-4 h-4 flex-shrink-0">
            <svg 
              class="w-full h-full transform transition-transform duration-300" 
              xmlns="http://www.w3.org/2000/svg" 
              fill="none" 
              viewBox="0 0 14 8">
              <path 
                stroke="currentColor" 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                stroke-width="1" 
                d="M1 1l6 6 6-6"></path>
            </svg>
          </div>
        </div>
      </button>
      </div>

      <!-- Accordion Body -->
      <div
        id="accordion-body-{{ $index }}"
        role="region"
        aria-labelledby="accordion-button-{{ $index }}"
        class="hidden-filters p-4 bg-white">
        <div class="space-y-2">
          <!-- Dynamic Content with Checkboxes -->
          {{ range $optionIndex, $option := $filter.Options }}
          <div class="flex items-center justify-between">
            <label for="filter-{{ $index }}-{{ $optionIndex }}" class="flex items-center space-x-2 cursor-pointer">
              <input
                id="filter-{{ $index }}-{{ $optionIndex }}"
                type="checkbox"
                class="form-checkbox h-4 w-4 text-blue-600">
              <span>{{ $option.Label }}</span>
            </label>
            <span>{{ $option.Count }}</span>
          </div>
          {{ end }}
        </div>
      </div>
    </div>
    {{ end }}
</aside>

<style>
  .hidden-filters {
    display: none !important;
  }
  .svg-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 16px;
    height: 16px;
  }
</style>

<script>
  function toggleAccordion(index) {
    const accordionBody = document.getElementById(`accordion-body-${index}`);
    const accordionButton = document.getElementById(`accordion-button-${index}`);
    const isHidden = accordionBody.classList.contains('hidden-filters');

    // Toggle visibility
    accordionBody.classList.toggle('hidden-filters', !isHidden);
    accordionBody.classList.toggle('block', isHidden);

    // Update aria-expanded
    accordionButton.setAttribute('aria-expanded', isHidden);

    // Rotate the arrow icon
    const svg = accordionButton.querySelector('svg');
    svg.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
  }
</script>
{{ end }}
